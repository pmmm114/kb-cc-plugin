name: tests

# PR-gating workflow. Runs on every push/pull-request per RULESET-POLICY.md —
# `paths:` filters are intentionally omitted so every PR produces the
# `error-reporter end-to-end smoke` check required by the branch ruleset.
# The tests are fast (<45s) so the cost of repo-wide execution is acceptable.

on:
  push:
  pull_request:

jobs:
  error-reporter-smoke:
    name: error-reporter end-to-end smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: end_to_end_test.sh
        run: bash error-reporter/tests/end_to_end_test.sh
      - name: unit_preset_helpers.sh
        run: bash error-reporter/tests/unit_preset_helpers.sh
      - name: unit_resolve_repo.sh
        run: bash error-reporter/tests/unit_resolve_repo.sh
      - name: verify_preset_equivalence.sh
        run: bash error-reporter/tests/verify_preset_equivalence.sh
      - name: unit_incident_to_eval.sh
        run: bash error-reporter/tests/unit_incident_to_eval.sh
