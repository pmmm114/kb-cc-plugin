name: Bug report
description: 플러그인에서 발생한 버그를 보고합니다
title: "[bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: plugin
    attributes:
      label: Plugin
      description: 버그가 발생한 플러그인을 선택하세요
      options:
        - dashboard
        - error-reporter
        - other / not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      description: "`installed_plugins.json`의 version 또는 git SHA"
      placeholder: "e.g. 2.0.0 or b3d5f61c"

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: 관찰한 동작을 구체적으로 적어주세요
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: 어떤 동작을 기대했나요?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: 재현 절차 (가능한 한 최소 단위로)
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: "훅 디버그 로그, 스택 트레이스, 에러 메시지 등 (민감 정보는 제거)"
      render: text

  - type: input
    id: env
    attributes:
      label: Environment
      description: "OS, Claude Code 버전, shell 등"
      placeholder: "macOS 14 / Claude Code 1.x / zsh"
